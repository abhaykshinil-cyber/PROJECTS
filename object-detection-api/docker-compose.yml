version: "3.9"

services:
  api:
    build:
      context: .
      target: runtime
    image: object-detection-api:latest
    container_name: detection-api
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY:-}          # leave blank to disable auth
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-yolov8n}
    volumes:
      # Persist downloaded weights across rebuilds
      - model-cache:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Uncomment for GPU support (requires nvidia-container-toolkit)
  # api-gpu:
  #   build:
  #     context: .
  #     target: runtime
  #   image: object-detection-api-gpu:latest
  #   runtime: nvidia
  #   environment:
  #     - NVIDIA_VISIBLE_DEVICES=all
  #   ports:
  #     - "8001:8000"

volumes:
  model-cache:
